<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha DX – Álbum Institucional</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg:      #060b14;
  --surf:    #0d1726;
  --surf2:   #132034;
  --gold:    #d4a843;
  --gold2:   #f0c96a;
  --gold-gl: rgba(212,168,67,0.12);
  --blue:    #4ab8e8;
  --blue-gl: rgba(74,184,232,0.10);
  --white:   #eef2ff;
  --muted:   rgba(238,242,255,0.38);
  --border:  rgba(238,242,255,0.07);
  --red:     #e05858;
  --green:   #52c997;
  --radius:  16px;
  --shadow:  0 8px 32px rgba(0,0,0,0.45);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 14px 80px;
  overflow-x:hidden;
  position:relative;
}

/* ── Ambient background ────────────────────────────── */
body::before{
  content:'';
  position:fixed;
  top:-10%;left:50%;
  transform:translateX(-50%);
  width:700px;height:500px;
  background:radial-gradient(ellipse at center, rgba(212,168,67,.055) 0%, transparent 65%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';
  position:fixed;
  bottom:0;left:0;right:0;
  height:200px;
  background:linear-gradient(to top, rgba(6,11,20,.9), transparent);
  pointer-events:none;z-index:0;
}

/* ── Top bar ───────────────────────────────────────── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:54px;
  background:rgba(6,11,20,.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
}
.topbar-title{
  font-family:'Syne',sans-serif;
  font-size:.85rem;font-weight:700;
  letter-spacing:4px;color:var(--gold);
  text-transform:uppercase;
}
.topbar-controls{display:flex;gap:8px;}

.ico-btn{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  color:var(--white);
  width:36px;height:36px;
  border-radius:10px;
  cursor:pointer;
  font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.ico-btn:hover{border-color:var(--gold);background:var(--gold-gl);}
.ico-btn.on{background:var(--gold-gl);border-color:var(--gold);color:var(--gold);}

/* ── Header ────────────────────────────────────────── */
header{
  margin-top:74px;
  text-align:center;
  padding:32px 0 20px;
  width:100%;max-width:900px;
  position:relative;z-index:1;
}
.header-tag{
  font-size:.7rem;letter-spacing:4px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;
}
h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.4rem,8vw,4rem);
  font-weight:800;
  letter-spacing:10px;
  color:var(--gold);
  text-shadow:0 0 40px rgba(212,168,67,.35);
  line-height:1;
}
.divider{
  display:flex;align-items:center;gap:16px;
  margin:16px 0 6px;
}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--gold);opacity:.5;
}
.subtitle{
  font-size:.72rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted);
}

/* ── Progress ──────────────────────────────────────── */
.prog-wrap{
  width:100%;max-width:900px;
  margin-bottom:32px;
  position:relative;z-index:1;
}
.prog-info{
  display:flex;justify-content:space-between;
  font-size:.72rem;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;
}
.prog-bar{
  height:3px;background:var(--border);
  border-radius:3px;overflow:hidden;
}
#prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  transition:width 1.2s cubic-bezier(.25,1,.5,1);
  border-radius:3px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Toast ─────────────────────────────────────────── */
.toast{
  position:fixed;
  top:64px;left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:var(--surf2);
  border:1px solid var(--gold);
  padding:10px 22px;border-radius:12px;
  font-size:.82rem;font-weight:500;
  z-index:200;opacity:0;pointer-events:none;
  transition:all .35s cubic-bezier(.175,.885,.32,1.275);
  white-space:nowrap;max-width:90vw;
  box-shadow:var(--shadow);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Modal ─────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  z-index:150;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--surf);
  border:1px solid rgba(212,168,67,.35);
  border-radius:24px;
  padding:44px 36px;
  text-align:center;
  max-width:300px;width:90%;
  transform:scale(.85) translateY(20px);
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 40px 90px rgba(0,0,0,.7), 0 0 0 1px rgba(212,168,67,.1);
  position:relative;overflow:hidden;
}
.modal::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,.5),transparent);
}
.overlay.show .modal{transform:scale(1) translateY(0);}
.modal-icon{font-size:5rem;display:block;margin-bottom:16px;
  animation:floatIcon 3s ease-in-out infinite;}
@keyframes floatIcon{
  0%,100%{transform:translateY(0) rotate(-3deg);}
  50%{transform:translateY(-10px) rotate(3deg);}
}
.modal-name{
  font-family:'Syne',sans-serif;
  font-size:1.3rem;font-weight:800;
  letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin-bottom:8px;
}
.modal-status{font-size:.82rem;color:var(--muted);margin-bottom:28px;line-height:1.5;}
.tag-new{color:var(--green);font-weight:600;}
.tag-dup{color:var(--red);}

/* ── Primary button ────────────────────────────────── */
.btn-primary{
  background:var(--gold);
  color:#060b14;
  border:none;
  padding:13px 28px;
  font-family:'Syne',sans-serif;
  font-size:.82rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  border-radius:12px;cursor:pointer;
  transition:all .25s cubic-bezier(.175,.885,.32,1.275);
  position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  transition:left .4s;
}
.btn-primary:hover{
  transform:translateY(-2px) scale(1.04);
  box-shadow:0 12px 30px rgba(212,168,67,.35);
}
.btn-primary:hover::after{left:100%;}
.btn-primary:active{transform:scale(.97);}

/* ── Quiz panel ────────────────────────────────────── */
.quiz-wrap{
  width:100%;max-width:560px;
  margin-bottom:44px;
  position:relative;z-index:1;
}
.quiz-card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 24px;
  transition:all .3s;
}
.quiz-header{
  display:flex;align-items:flex-start;gap:12px;
  margin-bottom:22px;
}
.tts-btn{
  flex-shrink:0;
  background:var(--blue-gl);
  border:1px solid rgba(74,184,232,.25);
  color:var(--blue);
  width:34px;height:34px;
  border-radius:8px;cursor:pointer;
  font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;margin-top:1px;
}
.tts-btn:hover{background:rgba(74,184,232,.2);transform:scale(1.08);}
.tts-btn.speaking{animation:pulseTts .7s ease-in-out infinite alternate;}
@keyframes pulseTts{from{opacity:1;}to{opacity:.4;}}

.q-label{
  font-size:.65rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--blue);margin-bottom:6px;font-weight:600;
}
.q-text{
  font-size:.94rem;line-height:1.65;
  color:var(--white);font-weight:400;
}
.q-sub{
  display:block;margin-top:5px;
  font-size:.82rem;color:var(--muted);line-height:1.55;
}

.opts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}
.opt{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  color:var(--white);
  padding:13px 14px;
  border-radius:12px;cursor:pointer;
  text-align:left;
  font-size:.84rem;line-height:1.4;
  display:flex;align-items:flex-start;gap:10px;
  transition:all .18s;
  font-family:'Inter',sans-serif;
}
.opt:hover:not(:disabled){
  border-color:rgba(212,168,67,.5);
  background:var(--gold-gl);
  transform:translateY(-1px);
}
.opt:disabled{cursor:default;}
.opt.correct{border-color:var(--green)!important;background:rgba(82,201,151,.1)!important;}
.opt.wrong  {border-color:var(--red)!important;  background:rgba(224,88,88,.1)!important;}
.opt-ltr{
  flex-shrink:0;width:20px;height:20px;
  background:rgba(255,255,255,.08);border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:var(--gold);
  transition:all .2s;
}
.opt.correct .opt-ltr{background:var(--green);color:#000;}
.opt.wrong   .opt-ltr{background:var(--red);color:#fff;}

/* Reward card */
.reward-inner{text-align:center;padding:24px 16px;}
.reward-icon{
  font-size:5rem;display:inline-block;
  animation:floatIcon 2.5s ease-in-out infinite;
  margin:12px 0;
}
.reward-heading{
  font-family:'Syne',sans-serif;
  font-size:1.3rem;font-weight:800;
  color:var(--gold);letter-spacing:2px;margin-bottom:6px;
}
.reward-sub{font-size:.8rem;color:var(--muted);margin-bottom:24px;}

/* ── Album ─────────────────────────────────────────── */
.album-wrap{
  width:100%;max-width:900px;
  position:relative;z-index:1;
}

.album-nav{
  display:flex;gap:6px;flex-wrap:wrap;
  justify-content:center;margin-bottom:28px;
}
.nav-btn{
  background:transparent;
  color:var(--muted);
  border:1px solid var(--border);
  padding:8px 18px;font-size:.72rem;
  letter-spacing:2px;border-radius:8px;cursor:pointer;
  text-transform:uppercase;
  font-family:'Syne',sans-serif;font-weight:600;
  transition:all .2s;
}
.nav-btn:hover{color:var(--white);border-color:rgba(255,255,255,.18);}
.nav-btn.active{color:var(--gold);border-color:var(--gold);background:var(--gold-gl);}

.album-page{display:none;animation:fadeUp .35s ease-out both;}
.album-page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.page-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:20px;
}
.page-name{
  font-family:'Syne',sans-serif;
  font-size:.7rem;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);white-space:nowrap;
}
.page-hr{flex:1;height:1px;background:var(--border);}
.page-cnt{font-size:.7rem;color:var(--muted);letter-spacing:1px;white-space:nowrap;}

.sticker-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:14px;
}

/* Sticker */
.sticker{
  aspect-ratio:3/4;border-radius:14px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:12px 8px;position:relative;
  border:1px dashed rgba(255,255,255,.08);
  background:rgba(255,255,255,.018);
  overflow:hidden;
  transition:transform .25s cubic-bezier(.175,.885,.32,1.275),
             box-shadow .25s;
}
.sticker.owned{
  background:linear-gradient(155deg,#152238 0%,#0e1c30 100%);
  border:1px solid rgba(212,168,67,.3);
  box-shadow:0 4px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);
  animation:cardIn .5s cubic-bezier(.175,.885,.32,1.275) both;
  cursor:pointer;
}
.sticker.owned:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 16px 36px rgba(0,0,0,.5),0 0 0 1px rgba(212,168,67,.45);
}
@keyframes cardIn{
  0%{transform:scale(.5) rotate(-8deg);opacity:0;filter:brightness(2.5);}
  60%{transform:scale(1.06) rotate(1deg);}
  100%{transform:scale(1) rotate(0);opacity:1;filter:brightness(1);}
}

/* Shimmer on owned */
.sticker.owned::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:45%;
  background:linear-gradient(to bottom,rgba(255,255,255,.06),transparent);
  pointer-events:none;border-radius:14px 14px 0 0;
}
.sticker-icon{
  font-size:2.8rem;margin-bottom:10px;
  transition:transform .3s cubic-bezier(.175,.885,.32,1.275);
  position:relative;z-index:1;
}
.sticker.owned:hover .sticker-icon{transform:scale(1.25) rotate(6deg);}
.sticker-name{
  font-family:'Syne',sans-serif;
  font-size:.68rem;font-weight:700;
  text-align:center;color:var(--gold);
  text-transform:uppercase;letter-spacing:.5px;
  line-height:1.3;position:relative;z-index:1;
}
.sticker-id{
  position:absolute;bottom:7px;right:9px;
  font-size:.58rem;color:var(--muted);font-weight:600;
}
.rep-tag{
  position:absolute;top:-1px;right:-1px;
  background:var(--red);color:#fff;
  font-size:.6rem;padding:3px 7px;
  border-radius:0 12px 0 9px;font-weight:700;
  letter-spacing:.5px;
}

/* ── Footer reset ──────────────────────────────────── */
.reset-area{
  margin-top:56px;text-align:center;
  position:relative;z-index:1;
}
.ghost-btn{
  background:transparent;
  border:1px solid rgba(224,88,88,.25);
  color:rgba(224,88,88,.5);
  padding:7px 16px;font-size:.7rem;
  letter-spacing:1px;border-radius:8px;
  cursor:pointer;text-transform:uppercase;
  font-family:'Inter',sans-serif;
  transition:all .2s;
}
.ghost-btn:hover{color:var(--red);border-color:var(--red);}

/* ── Particles ─────────────────────────────────────── */
.particle{
  position:fixed;pointer-events:none;z-index:160;
  font-size:1.2rem;
  animation:particleFly .8s ease-out forwards;
}
@keyframes particleFly{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-title">Alpha DX</span>
  <div class="topbar-controls">
    <button class="ico-btn on" id="soundBtn" onclick="toggleSound()" title="Efectos">🔊</button>
    <button class="ico-btn"   id="musicBtn" onclick="toggleMusic()" title="Música ambiental">🎵</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Card Modal -->
<div class="overlay" id="cardOverlay">
  <div class="modal">
    <span class="modal-icon" id="mIcon">🃏</span>
    <div class="modal-name" id="mName">CARTA</div>
    <div class="modal-status" id="mStatus"></div>
    <button class="btn-primary" onclick="closeModal()">Continuar →</button>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-tag">Álbum Institucional · ECOEMS</div>
  <h1>ALPHA DX</h1>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>
  <div class="subtitle">Colección completa de figuritas</div>
</header>

<!-- Progress -->
<div class="prog-wrap">
  <div class="prog-info">
    <span id="statsText">0 / 31 coleccionadas</span>
    <span id="pctText">0%</span>
  </div>
  <div class="prog-bar"><div id="prog-fill"></div></div>
</div>

<!-- Quiz -->
<div class="quiz-wrap">
  <!-- Question -->
  <div class="quiz-card" id="quizUI">
    <div class="quiz-header">
      <button class="tts-btn" id="ttsBtn" onclick="readAloud()" title="Escuchar pregunta">🔊</button>
      <div>
        <div class="q-label">Pregunta</div>
        <div class="q-text" id="qText">Cargando…</div>
      </div>
    </div>
    <div class="opts" id="optsGrid"></div>
  </div>

  <!-- Reward -->
  <div class="quiz-card" id="rewardUI" style="display:none;">
    <div class="reward-inner">
      <div class="reward-icon">📦</div>
      <div class="reward-heading">¡Correcto!</div>
      <div class="reward-sub">Ganaste un sobre institucional</div>
      <button class="btn-primary" onclick="openPack()">Abrir Sobre →</button>
    </div>
  </div>
</div>

<!-- Album -->
<div class="album-wrap">
  <div class="album-nav">
    <button class="nav-btn active" onclick="showPage(1)">Extras</button>
    <button class="nav-btn"        onclick="showPage(2)">Alumnos</button>
    <button class="nav-btn"        onclick="showPage(3)">Temario</button>
    <button class="nav-btn"        onclick="showPage(4)">Medios</button>
  </div>
  <div id="p1" class="album-page active"></div>
  <div id="p2" class="album-page"></div>
  <div id="p3" class="album-page"></div>
  <div id="p4" class="album-page"></div>
</div>

<div class="reset-area">
  <button class="ghost-btn" onclick="resetAlbum()">Reiniciar álbum</button>
</div>

<script>

];

/* ── Questions ────────────────────────────────── */
const QUESTIONS = [
  {
    q:'¿Cuál es el término que continúa en la siguiente serie?\n8, 12, 14, 18, 20, …',
    o:['24','22','28','26'], a:0
  },

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let inventory = JSON.parse(localStorage.getItem('alphaDxV3') || '{}');
let soundOn   = true;
let musicOn   = false;
let audioCtx  = null;
let musicNode = null;
let currentQ  = null;
let locked    = false;

/* ═══════════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════════ */
function ctx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq, type='sine', dur=0.15, vol=0.07, delay=0){
  if(!soundOn) return;
  const c=ctx(), o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0, c.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol, c.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+delay+dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+delay);
  o.stop(c.currentTime+delay+dur+0.02);
}

function sfxClick(){ tone(480,'sine',.07,.05); }
function sfxNav()  { tone(880,'sine',.06,.04); }
function sfxError(){
  tone(180,'sawtooth',.25,.09);
  tone(140,'sawtooth',.25,.08,.12);
}
function sfxSuccess(){
  [523,659,784,1047].forEach((f,i)=> tone(f,'sine',.22,.07,i*.09));
}
function sfxReveal(){
  [330,415,523,622,784,1047].forEach((f,i)=> tone(f,'triangle',.28,.06,i*.07));
}
function sfxDup(){ tone(440,'triangle',.3,.06); }

function toggleSound(){
  soundOn=!soundOn;
  const b=document.getElementById('soundBtn');
  b.textContent=soundOn?'🔊':'🔇';
  b.classList.toggle('on',soundOn);
  if(soundOn) sfxClick();
}

function toggleMusic(){
  const c=ctx();
  musicOn=!musicOn;
  document.getElementById('musicBtn').classList.toggle('on',musicOn);
  if(musicOn){
    musicNode=c.createOscillator();
    const g=c.createGain();
    musicNode.type='triangle';
    musicNode.frequency.setValueAtTime(110, c.currentTime);

    // Slowly drift frequency for an ambient feel
    const lfo=c.createOscillator();
    const lfoGain=c.createGain();
    lfo.frequency.value=0.08; lfoGain.gain.value=4;
    lfo.connect(lfoGain); lfoGain.connect(musicNode.frequency);
    lfo.start();

    g.gain.value=0.012;
    musicNode.connect(g); g.connect(c.destination);
    musicNode.start();
  } else {
    if(musicNode){ try{musicNode.stop();}catch(e){} musicNode=null; }
  }
}

/* ═══════════════════════════════════════════════
   TTS
═══════════════════════════════════════════════ */
function readAloud(){
  if(!currentQ) return;
  const utterance=new SpeechSynthesisUtterance(currentQ.q.replace(/\n/g,'. '));
  utterance.lang='es-MX'; utterance.rate=.92;
  const btn=document.getElementById('ttsBtn');
  btn.classList.add('speaking');
  utterance.onend=()=>btn.classList.remove('speaking');
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
  sfxClick();
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
let toastTimer=null;
function toast(msg, dur=3200){
  const el=document.getElementById('toast');
  el.innerHTML=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'), dur);
}

/* ═══════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════ */
function burst(x, y, emojis=['✨','⭐','🌟']){
  emojis.forEach(em=>{
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=em;
    const tx=(Math.random()-0.5)*180;
    const ty=-(Math.random()*140+40);
    p.style.cssText=`left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 900);
  });
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
let pendingPage=1;
function showModal(card, isNew){
  document.getElementById('mIcon').textContent=card.icon;
  document.getElementById('mName').textContent=card.name.toUpperCase();
  document.getElementById('mStatus').innerHTML=isNew
    ? `<span class="tag-new">✦ ¡Nueva adquisición!</span>`
    : `<span class="tag-dup">Ya la tenías — figurita repetida</span>`;
  document.getElementById('cardOverlay').classList.add('show');
  pendingPage=card.page;
  if(isNew){ sfxReveal(); burst(window.innerWidth/2, window.innerHeight/2, ['✨','⭐','🌟','💫','🎉']); }
  else sfxDup();
}

function closeModal(){
  document.getElementById('cardOverlay').classList.remove('show');
  renderAlbum();
  updateProgress();
  newChallenge();
  showPage(pendingPage);
}

/* ═══════════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════════ */
function newChallenge(){
  currentQ=QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
  locked=false;
  document.getElementById('quizUI').style.display='block';
  document.getElementById('rewardUI').style.display='none';

  // Render question text (handle newlines)
  const parts=currentQ.q.split('\n');
  let html=parts[0];
  for(let i=1;i<parts.length;i++){
    html+=`<span class="q-sub">${parts[i]}</span>`;
  }
  document.getElementById('qText').innerHTML=html;

  // Render options
  const grid=document.getElementById('optsGrid');
  grid.innerHTML='';
  const letters=['A','B','C','D'];
  currentQ.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-ltr">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>answer(i,btn);
    grid.appendChild(btn);
  });
}

function answer(idx, btn){
  if(locked) return;
  locked=true;
  sfxClick();
  const allBtns=document.querySelectorAll('.opt');
  allBtns.forEach(b=>b.disabled=true);

  if(idx===currentQ.a){
    btn.classList.add('correct');
    sfxSuccess();
    // small particle burst from button
    const r=btn.getBoundingClientRect();
    burst(r.left+r.width/2, r.top, ['✅','⭐','✨']);
    setTimeout(()=>{
      document.getElementById('quizUI').style.display='none';
      document.getElementById('rewardUI').style.display='block';
    }, 900);
  } else {
    btn.classList.add('wrong');
    allBtns[currentQ.a].classList.add('correct');
    sfxError();
    setTimeout(()=>{
      toast('Respuesta incorrecta — ¡sigue intentando!');
      newChallenge();
    }, 1600);
  }
}

/* ═══════════════════════════════════════════════
   PACK
═══════════════════════════════════════════════ */
function openPack(){
  sfxClick();
  const card=CARDS[Math.floor(Math.random()*CARDS.length)];
  const isNew=!inventory[card.id];
  inventory[card.id]=(inventory[card.id]||0)+1;
  localStorage.setItem('alphaDxV3', JSON.stringify(inventory));
  showModal(card, isNew);
}

/* ═══════════════════════════════════════════════
   RENDER ALBUM
═══════════════════════════════════════════════ */
function renderAlbum(){
  PAGES.forEach(pg=>{
    const container=document.getElementById(`p${pg.id}`);
    const pageCards=CARDS.filter(c=>c.page===pg.id);
    const ownedCount=pageCards.filter(c=>inventory[c.id]).length;

    container.innerHTML=`
      <div class="page-head">
        <span class="page-name">${pg.label}</span>
        <div class="page-hr"></div>
        <span class="page-cnt">${ownedCount}/${pageCards.length}</span>
      </div>
      <div class="sticker-grid" id="g${pg.id}"></div>
    `;

    const grid=document.getElementById(`g${pg.id}`);
    pageCards.forEach((card,i)=>{
      const count=inventory[card.id]||0;
      const div=document.createElement('div');
      div.className=`sticker${count>0?' owned':''}`;
      div.style.animationDelay=`${i*0.04}s`;
      if(count>0){
        div.innerHTML=`
          <div class="sticker-icon">${card.icon}</div>
          <div class="sticker-name">${card.name}</div>
          <div class="sticker-id">#${String(card.id+1).padStart(2,'0')}</div>
          ${count>1?`<div class="rep-tag">+${count-1}</div>`:''}
        `;
        div.onclick=()=>{ sfxNav(); toast(`${card.icon} <b>${card.name}</b>`); };
      } else {
        div.innerHTML=`
          <div class="sticker-icon" style="opacity:.07;filter:grayscale(1)">❓</div>
          <div class="sticker-name" style="opacity:.18;font-size:.6rem">${String(card.id+1).padStart(2,'0')}</div>
        `;
      }
      grid.appendChild(div);
    });
  });
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function showPage(num){
  document.querySelectorAll('.album-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`p${num}`).classList.add('active');
  document.querySelectorAll('.nav-btn')[num-1].classList.add('active');
  sfxNav();
}

/* ═══════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════ */
function updateProgress(){
  const unique=Object.keys(inventory).length;
  const total=CARDS.length;
  const pct=Math.round((unique/total)*100);
  document.getElementById('statsText').textContent=`${unique} / ${total} coleccionadas`;
  document.getElementById('pctText').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=`${pct}%`;
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetAlbum(){
  if(confirm('¿Borrar todo el progreso?')){
    inventory={};
    localStorage.removeItem('alphaDxV3');
    location.reload();
  }
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
(function init(){
  renderAlbum();
  updateProgress();
  newChallenge();
})();
</script>
